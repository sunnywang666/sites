<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEX Color Debugger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    :root {
      --font: "JetBrains Mono", ui-monospace, "Cascadia Code", Consolas, monospace;
      --bg: #f2f2f0;
      --surface: #ffffff;
      --ink: #1a1a1a;
      --muted: #737373;
      --hairline: #e0e0de;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(20px, 5vw, 48px);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    .mixer {
      width: min(720px, 100%);
      font-family: var(--font);
      background: var(--surface);
      padding: clamp(28px, 5vw, 48px) clamp(24px, 4vw, 40px);
      border: 1px solid var(--hairline);
    }

    .mixer__title {
      margin: 0 0 clamp(1rem, 2.5vw, 1.5rem);
      font-size: clamp(1.0625rem, 2.2vw, 1.375rem);
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: -0.02em;
      color: var(--ink);
      text-align: center;
    }

    #hexresult {
      position: relative;
      min-height: clamp(140px, 32vw, 200px);
      margin-bottom: clamp(28px, 5vw, 40px);
      border: 1px solid var(--hairline);
      overflow: hidden;
      transition: background-color 0.12s ease;
    }

    #hexresulttext {
      margin: 0;
      height: 100%;
      min-height: inherit;
      display: grid;
      place-items: center;
      padding: 1rem 1.25rem;
      text-align: center;
      font-size: clamp(1rem, 2.8vw, 1.5rem);
      font-weight: 500;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
    }

    .sliders {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(1.25rem, 3vw, 2rem);
      padding-top: clamp(1.25rem, 3vw, 1.75rem);
      border-top: 1px solid var(--hairline);
      align-items: end;
    }

    .slider-col {
      text-align: center;
    }

    .slider-col label {
      display: block;
      margin-bottom: 0.65rem;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .slider-col input[type="range"] {
      width: 100%;
      height: 4px;
      accent-color: var(--ink);
    }

    .slider-col .value {
      margin-top: 0.5rem;
      font-size: clamp(1.125rem, 2.5vw, 1.375rem);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--ink);
      line-height: 1.2;
      text-transform: lowercase;
    }

    @media (max-width: 520px) {
      .sliders {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="mixer">
    <h1 class="mixer__title">HEX Color Debugger</h1>
    <div id="hexresult">
      <p id="hexresulttext">#ff6347</p>
    </div>
    <div class="sliders">
      <div class="slider-col">
        <label for="slideRedHex">RED</label>
        <input type="range" id="slideRedHex" value="255" min="0" max="255">
        <div id="valRed2Hex" class="value">ff</div>
      </div>
      <div class="slider-col">
        <label for="slideGreenHex">GREEN</label>
        <input type="range" id="slideGreenHex" value="99" min="0" max="255">
        <div id="valGreen2Hex" class="value">63</div>
      </div>
      <div class="slider-col">
        <label for="slideBlueHex">BLUE</label>
        <input type="range" id="slideBlueHex" value="71" min="0" max="255">
        <div id="valBlue2Hex" class="value">47</div>
      </div>
    </div>
  </div>
  <script>
    const slideRedHex = document.getElementById("slideRedHex");
    const slideGreenHex = document.getElementById("slideGreenHex");
    const slideBlueHex = document.getElementById("slideBlueHex");
    const valRed2Hex = document.getElementById("valRed2Hex");
    const valGreen2Hex = document.getElementById("valGreen2Hex");
    const valBlue2Hex = document.getElementById("valBlue2Hex");
    const hexresult = document.getElementById("hexresult");
    const hexresulttext = document.getElementById("hexresulttext");

    function byteToHex(n) {
      const v = Math.max(0, Math.min(255, Number(n)));
      return v.toString(16).padStart(2, "0");
    }

    function relLuminance(r, g, b) {
      const srgb = [r, g, b].map((v) => {
        v /= 255;
        return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
      });
      return 0.2126 * srgb[0] + 0.7152 * srgb[1] + 0.0722 * srgb[2];
    }

    function changeHex() {
      const r = Number(slideRedHex.value);
      const g = Number(slideGreenHex.value);
      const b = Number(slideBlueHex.value);
      const hr = byteToHex(r);
      const hg = byteToHex(g);
      const hb = byteToHex(b);
      const hex = `#${hr}${hg}${hb}`;
      valRed2Hex.textContent = hr;
      valGreen2Hex.textContent = hg;
      valBlue2Hex.textContent = hb;
      hexresult.style.backgroundColor = hex;
      hexresulttext.textContent = hex;
      const L = relLuminance(r, g, b);
      hexresulttext.style.color = L > 0.45 ? "#1a1a1a" : "#fafafa";
    }

    [slideRedHex, slideGreenHex, slideBlueHex].forEach((el) => {
      el.addEventListener("input", changeHex);
      el.addEventListener("change", changeHex);
    });
    changeHex();
  </script>
</body>
</html>

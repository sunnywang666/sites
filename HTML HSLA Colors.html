<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSLA Color Debugger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      --font: "JetBrains Mono", ui-monospace, "Cascadia Code", Consolas, monospace;
      --bg: #f2f2f0;
      --surface: #ffffff;
      --ink: #1a1a1a;
      --muted: #737373;
      --hairline: #e0e0de;
      --checker: #ecece8;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(20px, 5vw, 48px);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    .mixer {
      width: min(800px, 100%);
      font-family: var(--font);
      background: var(--surface);
      padding: clamp(28px, 5vw, 48px) clamp(24px, 4vw, 40px);
      border: 1px solid var(--hairline);
    }
    .mixer__title {
      margin: 0 0 clamp(1rem, 2.5vw, 1.5rem);
      font-size: clamp(1.0625rem, 2.2vw, 1.375rem);
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: -0.02em;
      color: var(--ink);
      text-align: center;
    }
    #hslaresult {
      position: relative;
      min-height: clamp(140px, 32vw, 200px);
      margin-bottom: clamp(28px, 5vw, 40px);
      border: 1px solid var(--hairline);
      overflow: hidden;
    }
    #hslaresult::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background-color: var(--surface);
      background-image: repeating-conic-gradient(var(--checker) 0% 25%, var(--surface) 0% 50%);
      background-size: 14px 14px;
    }
    #hslaswatch {
      position: absolute;
      inset: 0;
      z-index: 1;
      transition: background-color 0.12s ease;
    }
    #hslaresulttext {
      position: relative;
      z-index: 2;
      margin: 0;
      height: 100%;
      min-height: inherit;
      display: grid;
      place-items: center;
      padding: 1rem 1.25rem;
      text-align: center;
      font-size: clamp(1rem, 2.8vw, 1.5rem);
      font-weight: 500;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
    }
    .sliders {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(1.25rem, 3vw, 2rem);
      padding-top: clamp(1.25rem, 3vw, 1.75rem);
      border-top: 1px solid var(--hairline);
      align-items: end;
    }
    .slider-col { text-align: center; }
    .slider-col label {
      display: block;
      margin-bottom: 0.65rem;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .slider-col input[type="range"] {
      width: 100%;
      height: 4px;
      accent-color: var(--ink);
    }
    .slider-col .value {
      margin-top: 0.5rem;
      font-size: clamp(1.125rem, 2.5vw, 1.375rem);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--ink);
      line-height: 1.2;
    }
    @media (max-width: 720px) {
      .sliders { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 380px) {
      .sliders { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="mixer">
    <h1 class="mixer__title">HSLA Color Debugger</h1>
    <div id="hslaresult">
      <div id="hslaswatch" aria-hidden="true"></div>
      <p id="hslaresulttext">HSLA(0, 100%, 50%, 0.5)</p>
    </div>
    <div class="sliders">
      <div class="slider-col">
        <label for="slideHueA">HUE</label>
        <input type="range" id="slideHueA" value="0" min="0" max="360">
        <div id="valHueA" class="value">0</div>
      </div>
      <div class="slider-col">
        <label for="slideSatA">SATURATION</label>
        <input type="range" id="slideSatA" value="100" min="0" max="100">
        <div id="valSatA" class="value">100%</div>
      </div>
      <div class="slider-col">
        <label for="slideLightA">LIGHTNESS</label>
        <input type="range" id="slideLightA" value="50" min="0" max="100">
        <div id="valLightA" class="value">50%</div>
      </div>
      <div class="slider-col">
        <label for="slideHslAlpha">ALPHA</label>
        <input type="range" id="slideHslAlpha" value="5" min="0" max="10">
        <div id="valHslAlpha" class="value">0.5</div>
      </div>
    </div>
  </div>
  <script>
    const slideHueA = document.getElementById("slideHueA");
    const slideSatA = document.getElementById("slideSatA");
    const slideLightA = document.getElementById("slideLightA");
    const slideHslAlpha = document.getElementById("slideHslAlpha");
    const valHueA = document.getElementById("valHueA");
    const valSatA = document.getElementById("valSatA");
    const valLightA = document.getElementById("valLightA");
    const valHslAlpha = document.getElementById("valHslAlpha");
    const swatch = document.getElementById("hslaswatch");
    const hslaresulttext = document.getElementById("hslaresulttext");

    function hslToRgb(h, s, l) {
      s = Math.max(0, Math.min(1, s));
      l = Math.max(0, Math.min(1, l));
      h = (((Number(h) % 360) + 360) % 360) / 360;
      const a = s * Math.min(l, 1 - l);
      const f = (n) => {
        const k = (n + h * 12) % 12;
        return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
      };
      return [
        Math.round(255 * f(0)),
        Math.round(255 * f(8)),
        Math.round(255 * f(4)),
      ];
    }

    function relLuminance(r, g, b) {
      const srgb = [r, g, b].map((v) => {
        v /= 255;
        return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
      });
      return 0.2126 * srgb[0] + 0.7152 * srgb[1] + 0.0722 * srgb[2];
    }

    function changeHsla() {
      const h = Math.round(Number(slideHueA.value));
      const sPct = Math.round(Number(slideSatA.value));
      const lPct = Math.round(Number(slideLightA.value));
      const aRaw = Number(slideHslAlpha.value);
      const a = aRaw / 10;
      const s = sPct / 100;
      const l = lPct / 100;
      const css = `hsla(${h}, ${sPct}%, ${lPct}%, ${a})`;
      const display = `HSLA(${h}, ${sPct}%, ${lPct}%, ${a})`;
      valHueA.textContent = String(h);
      valSatA.textContent = sPct + "%";
      valLightA.textContent = lPct + "%";
      valHslAlpha.textContent = String(a);
      swatch.style.backgroundColor = css;
      hslaresulttext.textContent = display;
      const [r, g, b] = hslToRgb(h, s, l);
      const L = relLuminance(r, g, b);
      const onTop = a * L + (1 - a) * 0.92;
      hslaresulttext.style.color = onTop > 0.45 ? "#1a1a1a" : "#fafafa";
    }

    [slideHueA, slideSatA, slideLightA, slideHslAlpha].forEach((el) => {
      el.addEventListener("input", changeHsla);
      el.addEventListener("change", changeHsla);
    });
    changeHsla();
  </script>
</body>
</html>
